<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenota | </title>
    <meta name="description" content="AURA - Prenota il tuo tavolo.">
    <link rel="stylesheet" href="style.css?v=6">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="page-inner">
    <div class="preloader">
        <span class="preloader-text">AURA.</span>
        <img class="preloader-img" src="" alt="Logo" style="display: none; max-height: 80px; width: auto; object-fit: contain;">
    </div>
    <script>
        (function() {
            const cachedColor = localStorage.getItem('aura_primary_color');
            if (cachedColor) {
                document.documentElement.style.setProperty('--accent', cachedColor);
                var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(cachedColor);
                if(result) {
                    window.siteAccentRGB = {
                        r: parseInt(result[1], 16),
                        g: parseInt(result[2], 16),
                        b: parseInt(result[3], 16)
                    };
                }
            }

            const cachedName = localStorage.getItem('aura_restaurant_name');
            if (cachedName) {
                document.title = cachedName+ " | Contatta ";
                const preloaderText = document.querySelector('.preloader-text');
                if (preloaderText) preloaderText.textContent = cachedName;
                document.addEventListener('DOMContentLoaded', () => {
                    document.querySelectorAll('.logo-text').forEach(t => t.textContent = cachedName);
                });
            }

            const cachedLogo = localStorage.getItem('aura_main_logo');
            if (cachedLogo) {
                const text = document.querySelector('.preloader-text');
                const img = document.querySelector('.preloader-img');
                if(text) text.style.display = 'none';
                if(img) {
                    img.src = cachedLogo;
                    img.style.display = 'block';
                }
            }
        })();
    </script>
    <div id="cursor" class="custom-cursor"></div>
    <div id="cursor-follower" class="custom-cursor-follower"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-text">AURA.</span>
                <img class="logo-img" src="" alt="AURA Logo" data-image-slot="main_logo" style="display: none; max-height: 40px; width: auto; object-fit: contain;">
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-item">La Storia</a></li>
                <li><a href="menu.html" class="nav-item">Menu</a></li>
                <li><a href="gallery.html" class="nav-item">Galleria</a></li>
                <li><a href="contact.html" class="nav-item btn-primary">Prenota</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <main class="stack-container" style="padding-top: 100px;">
        <section id="contact" class="contact section stack-section">
            <div class="container">
                <div class="contact-wrapper scroll-reveal">
                    <div class="contact-info">
                        <h2 class="section-title scroll-reveal-text"><span class="text-inner">Prenota</span></h2>
                        <p>Assicurati il tuo tavolo per una serata indimenticabile.</p>
                        <div class="info-block">
                            <h4>Indirizzo</h4>
                            <p>Via della Moda, 42 - Milano</p>
                        </div>
                        <div class="info-block">
                            <h4>Orari</h4>
                            <p>Mar - Dom: 19:30 - 00:00</p>
                        </div>
                    </div>
                    <div class="contact-form">
                        <form id="reservation-form">
                            <div class="form-group">
                                <input type="text" id="name" required placeholder="Nome e Cognome">
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <input type="date" id="date" required>
                                </div>
                                <div class="form-group">
                                    <input type="time" id="time" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <select id="guests" required>
                                    <option value="" disabled selected>Numero di Ospiti</option>
                                    <option value="1">1 Persona</option>
                                    <option value="2">2 Persone</option>
                                    <option value="3">3 Persone</option>
                                    <option value="4">4 Persone</option>
                                    <option value="5+">5+ Persone</option>
                                </select>
                            </div>
                            <button type="submit" class="btn-primary full-width">Conferma Prenotazione</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-logo">
                <span class="logo-text">AURA.</span>
                <img class="logo-img" src="" alt="AURA Logo" data-image-slot="main_logo" style="display: none; max-height: 60px; width: auto; object-fit: contain; margin: 0 auto;">
            </div>
            <div class="footer-social">
                <a href="#">Instagram</a>
                <a href="#">Facebook</a>
            </div>
            <div class="footer-copy">
                &copy; 2026 AURA Restaurant. Tutti i diritti riservati.
            </div>
        </div>
    </footer>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>

    <script src="script.js"></script>
</body>
</html>
